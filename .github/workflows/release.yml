name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-14
            target: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p package/lib package/include
          cp ftxui_c_api.h package/include/
          cp build/libftxui_c_binding.a package/lib/
          find build/ftxui_build -name "libftxui-*.a" -exec cp {} package/lib/ \;
          if [ "$RUNNER_OS" = "macOS" ]; then
            cp build/libftxui_c_binding.dylib package/lib/
          else
            cp build/libftxui_c_binding.so package/lib/
          fi
          tar -czf ftxui-c-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C package .

      - uses: actions/upload-artifact@v4
        with:
          name: ftxui-c-${{ matrix.target }}
          path: ftxui-c-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ftxui-c-*.tar.gz

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create source bundle
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p /tmp/ftxui-c-${TAG}
          rsync -a --exclude='.git' --exclude='build' . /tmp/ftxui-c-${TAG}/
          tar -czf ftxui-c-${TAG}-src.tar.gz -C /tmp ftxui-c-${TAG}
          echo "SHA256=$(sha256sum ftxui-c-${TAG}-src.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Upload source bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ftxui-c-${{ github.ref_name }}-src.tar.gz

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          SHA=${SHA256}

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nassendelft/homebrew-ftxui-c.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/ftxui-c.rb << FORMULA
          class FtxuiC < Formula
            desc "C bindings for the FTXUI terminal UI library"
            homepage "https://github.com/nassendelft/ftxui-c"
            url "https://github.com/nassendelft/ftxui-c/releases/download/${TAG}/ftxui-c-${TAG}-src.tar.gz"
            sha256 "${SHA}"
            license "GPL-3.0-only"

            depends_on "cmake" => :build

            def install
              system "cmake", "-B", "build", "-DCMAKE_BUILD_TYPE=Release"
              system "cmake", "--build", "build"
              lib.install OS.mac? ? "build/libftxui_c_binding.dylib" : "build/libftxui_c_binding.so"
              include.install "ftxui_c_api.h"
            end

            test do
              (testpath/"test.c").write <<~C
                #include "ftxui_c_api.h"
                int main(void) { return 0; }
              C
              system ENV.cc, "test.c", "-I#{include}", "-o", "/dev/null"
            end
          end
          FORMULA

          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/ftxui-c.rb
          git diff --cached --quiet || git commit -m "Update ftxui-c to ${TAG}"
          git push
